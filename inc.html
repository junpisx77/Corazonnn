<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Efecto Encriptado</title>
<style>
 body {
   background: #000;
   color: #00ff55;
   font-family: "Courier New", monospace;
   margin: 0;
   padding: 0;
   overflow: hidden;
 }
 pre {
   white-space: pre-wrap;
   word-break: break-all;
   padding: 20px;
   font-size: 14px;
 }
</style>
</head>
<body>
<pre id="output"></pre>
<script>
const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%^&*()+=[]{}<>/\|';
function randomChar(){ return chars[Math.floor(Math.random()*chars.length)]; }
function randomString(len){ return Array.from({length:len},randomChar).join(''); }
function fill(){ document.getElementById('output').textContent = randomString(3000); }
setInterval(fill,100);
fill();
</script>
</body>
</html>
